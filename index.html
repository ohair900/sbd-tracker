  function renderChart() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    const w = rect.width - 24;
    const h = Math.min(w * 0.65, 300);
    canvas.width = w * dpr; canvas.height = h * dpr;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    chartPoints = [];
    ctx.clearRect(0, 0, w, h);

    if (chartType === 'e1rm') renderE1RMChart(w, h);
    else if (chartType === 'volume') renderVolumeChart(w, h);
    else if (chartType === 'bodyweight') renderBWChart(w, h);
    else if (chartType === 'wilks') renderWilksChart(w, h);
    else if (chartType === 'heatmap') renderHeatmap(w, h);
  }

  function drawEmpty(w, h, msg) {
    ctx.fillStyle = '#888'; ctx.font = '14px -apple-system, sans-serif';
    ctx.textAlign = 'center'; ctx.fillText(msg, w / 2, h / 2);
  }

  function drawAxes(w, h, pad, allDates, minVal, maxVal, unitLabel) {
    const cw = w - pad.left - pad.right;
    const ch = h - pad.top - pad.bottom;
    const valRange = maxVal - minVal || 1;

    // Grid
    ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 1;
    for (let i = 0; i <= 5; i++) {
      const y = pad.top + (i / 5) * ch;
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
      const val = maxVal - (i / 5) * valRange;
      ctx.fillStyle = '#666'; ctx.font = '10px -apple-system, sans-serif'; ctx.textAlign = 'right';
      ctx.fillText(fmtNum(val), pad.left - 8, y + 3);
    }
    // X labels
    ctx.fillStyle = '#666'; ctx.font = '10px -apple-system, sans-serif'; ctx.textAlign = 'center';
    const maxLabels = Math.floor(cw / 60);
    const step = Math.max(1, Math.ceil(allDates.length / maxLabels));
    allDates.forEach((date, i) => {
      if (i % step === 0 || i === allDates.length - 1) {
        const d = new Date(date + 'T12:00:00');
        const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const x = pad.left + (allDates.length === 1 ? cw / 2 : (i / (allDates.length - 1)) * cw);
        ctx.fillText(label, x, h - pad.bottom + 20);
      }
    });
  }

  // e1RM Chart
  function renderE1RMChart(w, h) {
    if (entries.length === 0) { drawEmpty(w, h, 'No data yet'); return; }
    const pad = { top: 20, right: 16, bottom: 40, left: 50 };
    const cw = w - pad.left - pad.right, ch = h - pad.top - pad.bottom;

    const liftsToShow = chartFilter === 'all' ? ['squat','bench','deadlift']
      : chartFilter === 'total' ? [] : [chartFilter];
    const showTotal = chartFilter === 'all' || chartFilter === 'total';

    function buildSeries(lift) {
      const byDate = {};
      entries.filter(e => e.lift === lift).forEach(e => {
        if (!byDate[e.date] || e.e1rm > byDate[e.date].e1rm) byDate[e.date] = e;
      });
      return Object.entries(byDate).sort((a, b) => a[0].localeCompare(b[0]))
        .map(([date, e]) => ({ date, value: e.e1rm, isPR: e.isPR }));
    }

    const series = {};
    liftsToShow.forEach(l => series[l] = buildSeries(l));
    if (showTotal) {
      const allDates = new Set(); entries.forEach(e => allDates.add(e.date));
      const sortedD = [...allDates].sort();
      const running = { squat: 0, bench: 0, deadlift: 0 };
      series.total = [];
      sortedD.forEach(date => {
        ['squat','bench','deadlift'].forEach(l => {
          const b = entries.filter(e => e.lift === l && e.date <= date).reduce((m, e) => Math.max(m, e.e1rm), 0);
          if (b > 0) running[l] = b;
        });
        if (running.squat > 0 && running.bench > 0 && running.deadlift > 0)
          series.total.push({ date, value: running.squat + running.bench + running.deadlift, isPR: false });
      });
    }

    const allDates = [...new Set(Object.values(series).flat().map(p => p.date))].sort();
    if (allDates.length === 0) { drawEmpty(w, h, 'No data for this filter'); return; }
    const allVals = Object.values(series).flat().map(p => displayWeight(p.value));
    const minVal = Math.floor(Math.min(...allVals) * 0.9);
    const maxVal = Math.ceil(Math.max(...allVals) * 1.05);
    const valRange = maxVal - minVal || 1;

    const xPos = date => pad.left + (allDates.length === 1 ? cw / 2 : (allDates.indexOf(date) / (allDates.length - 1)) * cw);
    const yPos = val => pad.top + ch - ((displayWeight(val) - minVal) / valRange) * ch;

    drawAxes(w, h, pad, allDates, minVal, maxVal);

    const drawOrder = [...liftsToShow]; if (showTotal) drawOrder.push('total');
    drawOrder.forEach(key => {
      const pts = series[key]; if (!pts || pts.length === 0) return;
      const color = COLORS[key];
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round';
      ctx.beginPath();
      pts.forEach((p, i) => {
        const x = xPos(p.date), y = yPos(p.value);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        chartPoints.push({ x, y, date: p.date, value: p.value, lift: key, color, isPR: p.isPR });
      });
      ctx.stroke();
      // Dots
      pts.forEach(p => {
        const x = xPos(p.date), y = yPos(p.value);
        ctx.beginPath();
        if (p.isPR) {
          ctx.arc(x, y, 5, 0, Math.PI * 2);
          ctx.fillStyle = '#ffd700';
        } else {
          ctx.arc(x, y, 3, 0, Math.PI * 2);
          ctx.fillStyle = color;
        }
        ctx.fill();
      });
    });
  }

  // Volume Chart
  function renderVolumeChart(w, h) {
    if (entries.length === 0) { drawEmpty(w, h, 'No data yet'); return; }
    const pad = { top: 20, right: 16, bottom: 40, left: 55 };
    const cw = w - pad.left - pad.right, ch = h - pad.top - pad.bottom;
    const lifts = chartFilter === 'all' ? ['squat','bench','deadlift'] : [chartFilter];

    const byDate = {};
    entries.forEach(e => {
      if (chartFilter !== 'all' && e.lift !== chartFilter) return;
      if (!byDate[e.date]) byDate[e.date] = { squat: 0, bench: 0, deadlift: 0 };
      byDate[e.date][e.lift] += e.weight * e.reps;
    });

    const dates = Object.keys(byDate).sort();
    if (dates.length === 0) { drawEmpty(w, h, 'No data for this filter'); return; }
    const totals = dates.map(d => lifts.reduce((s, l) => s + (byDate[d][l] || 0), 0));
    const maxVol = Math.max(...totals.map(v => displayWeight(v)));
    const minVal = 0, maxVal = Math.ceil(maxVol * 1.1);

    drawAxes(w, h, pad, dates, minVal, maxVal);

    const barW = Math.max(4, Math.min(30, (cw / dates.length) * 0.7));
    dates.forEach((date, i) => {
      const x = pad.left + (dates.length === 1 ? cw / 2 : (i / (dates.length - 1)) * cw) - barW / 2;
      let yBottom = pad.top + ch;
      lifts.forEach(lift => {
        const vol = byDate[date][lift] || 0;
        if (vol <= 0) return;
        const dispVol = displayWeight(vol);
        const barH = (dispVol / (maxVal - minVal)) * ch;
        ctx.fillStyle = COLORS[lift];
        ctx.fillRect(x, yBottom - barH, barW, barH);
        chartPoints.push({ x: x + barW/2, y: yBottom - barH/2, date, value: vol, lift, color: COLORS[lift] });
        yBottom -= barH;
      });
    });
  }

  // Bodyweight Chart
  function renderBWChart(w, h) {
    const bwh = profile.bodyweightHistory || [];
    if (bwh.length === 0) { drawEmpty(w, h, 'No bodyweight data yet'); return; }
    const pad = { top: 20, right: 16, bottom: 40, left: 50 };
    const cw = w - pad.left - pad.right, ch = h - pad.top - pad.bottom;

    const sorted = [...bwh].sort((a, b) => a.timestamp - b.timestamp);
    const dates = sorted.map(b => b.date);
    const vals = sorted.map(b => displayWeight(b.weight));
    const minVal = Math.floor(Math.min(...vals) * 0.95);
    const maxVal = Math.ceil(Math.max(...vals) * 1.05);
    const valRange = maxVal - minVal || 1;

    drawAxes(w, h, pad, dates, minVal, maxVal);

    const xPos = i => pad.left + (dates.length === 1 ? cw / 2 : (i / (dates.length - 1)) * cw);
    const yPos = v => pad.top + ch - ((v - minVal) / valRange) * ch;

    ctx.strokeStyle = '#aaa'; ctx.lineWidth = 2; ctx.lineJoin = 'round';
    ctx.beginPath();
    sorted.forEach((b, i) => {
      const x = xPos(i), y = yPos(displayWeight(b.weight));
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      chartPoints.push({ x, y, date: b.date, value: b.weight, lift: 'BW', color: '#aaa' });
    });
    ctx.stroke();
    sorted.forEach((b, i) => {
      ctx.beginPath(); ctx.arc(xPos(i), yPos(displayWeight(b.weight)), 3, 0, Math.PI * 2);
      ctx.fillStyle = '#aaa'; ctx.fill();
    });
  }

  // Wilks/DOTS Chart
  function renderWilksChart(w, h) {
    if (!profile.gender || !profile.bodyweight || entries.length === 0) {
      drawEmpty(w, h, 'Need profile + lift data'); return;
    }
    const pad = { top: 20, right: 16, bottom: 40, left: 50 };
    const cw = w - pad.left - pad.right, ch = h - pad.top - pad.bottom;

    const allDates = [...new Set(entries.map(e => e.date))].sort();
    const running = { squat: 0, bench: 0, deadlift: 0 };
    const bwHist = [...(profile.bodyweightHistory || [])].sort((a, b) => a.timestamp - b.timestamp);
    const dataPoints = [];

    allDates.forEach(date => {
      ['squat','bench','deadlift'].forEach(l => {
        const b = entries.filter(e => e.lift === l && e.date <= date).reduce((m, e) => Math.max(m, e.e1rm), 0);
        if (b > 0) running[l] = b;
      });
      if (running.squat > 0 && running.bench > 0 && running.deadlift > 0) {
        const total = running.squat + running.bench + running.deadlift;
        // Interpolate bodyweight
        let bw = profile.bodyweight;
        if (bwHist.length > 0) {
          const before = bwHist.filter(b => b.date <= date);
          const after = bwHist.filter(b => b.date > date);
          if (before.length > 0 && after.length > 0) {
            const b1 = before[before.length - 1], b2 = after[0];
            const t1 = new Date(b1.date).getTime(), t2 = new Date(b2.date).getTime();
            const t = new Date(date).getTime();
            const ratio = t2 === t1 ? 0 : (t - t1) / (t2 - t1);
            bw = b1.weight + (b2.weight - b1.weight) * ratio;
          } else if (before.length > 0) { bw = before[before.length - 1].weight; }
          else { bw = after[0].weight; }
        }
        const tKg = lbsToKg(total), bKg = lbsToKg(bw);
        const wilks = calcWilks(tKg, bKg, profile.gender);
        const dots = calcDOTS(tKg, bKg, profile.gender);
        if (wilks && dots) dataPoints.push({ date, wilks, dots });
      }
    });

    if (dataPoints.length === 0) { drawEmpty(w, h, 'Not enough data'); return; }
    const dates = dataPoints.map(p => p.date);
    const allVals = [...dataPoints.map(p => p.wilks), ...dataPoints.map(p => p.dots)];
    const minVal = Math.floor(Math.min(...allVals) * 0.9);
    const maxVal = Math.ceil(Math.max(...allVals) * 1.05);
    const valRange = maxVal - minVal || 1;

    drawAxes(w, h, pad, dates, minVal, maxVal);

    const xPos = i => pad.left + (dates.length === 1 ? cw / 2 : (i / (dates.length - 1)) * cw);
    const yPos = v => pad.top + ch - ((v - minVal) / valRange) * ch;

    // Wilks line
    ctx.strokeStyle = '#ff9800'; ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.beginPath();
    dataPoints.forEach((p, i) => { const x = xPos(i), y = yPos(p.wilks); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      chartPoints.push({ x, y, date: p.date, value: p.wilks, lift: 'Wilks', color: '#ff9800' }); });
    ctx.stroke();
    dataPoints.forEach((p, i) => { ctx.beginPath(); ctx.arc(xPos(i), yPos(p.wilks), 3, 0, Math.PI*2); ctx.fillStyle = '#ff9800'; ctx.fill(); });

    // DOTS line
    ctx.strokeStyle = '#ab47bc'; ctx.lineWidth = 2; ctx.beginPath();
    dataPoints.forEach((p, i) => { const x = xPos(i), y = yPos(p.dots); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      chartPoints.push({ x, y, date: p.date, value: p.dots, lift: 'DOTS', color: '#ab47bc' }); });
    ctx.stroke();
    dataPoints.forEach((p, i) => { ctx.beginPath(); ctx.arc(xPos(i), yPos(p.dots), 3, 0, Math.PI*2); ctx.fillStyle = '#ab47bc'; ctx.fill(); });

    // Legend
    ctx.font = '11px -apple-system, sans-serif';
    ctx.fillStyle = '#ff9800'; ctx.fillText('Wilks', pad.left + 5, pad.top + 12);
    ctx.fillStyle = '#ab47bc'; ctx.fillText('DOTS', pad.left + 55, pad.top + 12);
  }

  // Heatmap Chart (F10)
  function renderHeatmap(w, h) {
    if (entries.length === 0) { drawEmpty(w, h, 'No data yet'); return; }
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const weeksToShow = Math.min(26, Math.floor(w / 14));
    const daysBack = weeksToShow * 7;
    const startDate = new Date(today.getTime() - daysBack * 86400000);
    // Adjust to start on Monday
    const startDay = startDate.getDay();
    const adjustedStart = new Date(startDate.getTime() - ((startDay + 6) % 7) * 86400000);

    // Build volume by date
    const volByDate = {};
    entries.forEach(e => { volByDate[e.date] = (volByDate[e.date] || 0) + e.weight * e.reps; });
    const allVols = Object.values(volByDate).filter(v => v > 0);
    const maxVol = allVols.length > 0 ? Math.max(...allVols) : 1;

    const cellSize = Math.min(12, Math.floor((w - 40) / (weeksToShow + 1)));
    const gap = 2;
    const padLeft = 28;
    const padTop = 20;
    const dayLabels = ['M', '', 'W', '', 'F', '', 'S'];

    // Day of week labels
    ctx.font = '9px -apple-system, sans-serif'; ctx.fillStyle = '#666'; ctx.textAlign = 'right';
    for (let d = 0; d < 7; d++) {
      if (dayLabels[d]) ctx.fillText(dayLabels[d], padLeft - 4, padTop + d * (cellSize + gap) + cellSize - 1);
    }

    // Month labels
    ctx.textAlign = 'center';
    let lastMonth = -1;
    for (let wk = 0; wk <= weeksToShow; wk++) {
      const weekStart = new Date(adjustedStart.getTime() + wk * 7 * 86400000);
      const month = weekStart.getMonth();
      if (month !== lastMonth) {
        lastMonth = month;
        const x = padLeft + wk * (cellSize + gap) + cellSize / 2;
        ctx.fillText(weekStart.toLocaleDateString('en-US', { month: 'short' }), x, padTop - 6);
      }
    }

    // Draw cells
    for (let wk = 0; wk <= weeksToShow; wk++) {
      for (let day = 0; day < 7; day++) {
        const cellDate = new Date(adjustedStart.getTime() + (wk * 7 + day) * 86400000);
        if (cellDate > today) continue;
        const dateStr = cellDate.toISOString().split('T')[0];
        const vol = volByDate[dateStr] || 0;
        const x = padLeft + wk * (cellSize + gap);
        const y = padTop + day * (cellSize + gap);

        if (vol === 0) {
          ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--surface2').trim() || '#2a2a2a';
        } else {
          const intensity = Math.min(1, vol / maxVol);
          const r = Math.round(67 + (229 - 67) * intensity);
          const g = Math.round(160 + (57 - 160) * intensity * 0.3);
          const b = Math.round(71 * (1 - intensity * 0.5));
          ctx.fillStyle = `rgb(${r},${g},${b})`;
        }
        ctx.beginPath();
        ctx.roundRect(x, y, cellSize, cellSize, 2);
        ctx.fill();

        if (vol > 0) {
          chartPoints.push({ x: x + cellSize/2, y: y + cellSize/2, date: dateStr, value: vol, lift: 'Volume', color: ctx.fillStyle });
        }
      }
    }

    // Legend
    const legendX = w - 100, legendY = h - 14;
    ctx.font = '9px -apple-system, sans-serif'; ctx.fillStyle = '#666'; ctx.textAlign = 'left';
    ctx.fillText('Less', legendX, legendY);
    for (let i = 0; i < 5; i++) {
      const intensity = i / 4;
      if (intensity === 0) { ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--surface2').trim() || '#2a2a2a'; }
      else {
        const r = Math.round(67 + (229 - 67) * intensity);
        const g = Math.round(160 + (57 - 160) * intensity * 0.3);
        const b = Math.round(71 * (1 - intensity * 0.5));
        ctx.fillStyle = `rgb(${r},${g},${b})`;
      }
      ctx.fillRect(legendX + 30 + i * 11, legendY - 9, 9, 9);
    }
    ctx.fillStyle = '#666'; ctx.fillText('More', legendX + 88, legendY);
  }

  // Chart tooltip
  canvas.addEventListener('mousemove', handleChartHover);
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    handleChartHover({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY });
  }, { passive: false });
  canvas.addEventListener('mouseleave', () => tooltip.style.opacity = '0');
  canvas.addEventListener('touchend', () => tooltip.style.opacity = '0');

  function handleChartHover(e) {
    if (chartPoints.length === 0) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    let closest = null, minDist = Infinity;
    chartPoints.forEach(p => { const d = Math.hypot(p.x - mx, p.y - my); if (d < minDist && d < 40) { minDist = d; closest = p; } });
    if (closest) {
      const d = new Date(closest.date + 'T12:00:00');
      const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const name = LIFT_NAMES[closest.lift] || closest.lift;
      const valDisplay = (chartType === 'volume')
        ? fmtNum(displayWeight(closest.value)) + ' ' + unit
        : (chartType === 'wilks' || closest.lift === 'Wilks' || closest.lift === 'DOTS')
          ? Math.round(closest.value).toString()
          : formatWeight(closest.value) + ' ' + unit;
      tooltip.innerHTML = `<span style="color:${closest.color}">${name}</span>: ${valDisplay}<br>${label}`;
      const containerRect = canvas.parentElement.getBoundingClientRect();
      let tx = closest.x + 12, ty = closest.y - 40;
      if (tx + 120 > containerRect.width - 12) tx = closest.x - 120;
      if (ty < 0) ty = closest.y + 12;
      tooltip.style.left = (tx + 12) + 'px'; tooltip.style.top = (ty + 12) + 'px';
      tooltip.style.opacity = '1';
    } else { tooltip.style.opacity = '0'; }
  }

      name: '1000lb Club Tracker',
      short_name: '1000lb',
      description: 'Powerlifting tracker for the 1000lb club — e1RM, PR detection, Wilks/DOTS scoring, and cloud sync',
      start_url: location.href.split('?')[0],
      display: 'standalone',
      background_color: '#121212',
      theme_color: '#121212',
      icons: [{
        src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#1e1e1e"/><text x="50" y="65" text-anchor="middle" font-size="28" font-weight="bold" font-family="sans-serif" fill="#fff">1000</text></svg>'),
        sizes: 'any',
        type: 'image/svg+xml'
      }]
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    const manifestUrl = URL.createObjectURL(manifestBlob);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = manifestUrl;
    document.head.appendChild(link);

    // Service worker via Blob
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE_NAME = '1000lb-tracker-v2';
        self.addEventListener('install', e => {
          e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll([self.registration.scope])));
          self.skipWaiting();
        });
        self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
        self.addEventListener('fetch', e => {
          e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match(self.registration.scope))));
        });
      `;
      const swBlob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl).catch(() => {});
    }
  }

  // ===== INIT =====
  load();
  applyTheme();
  document.querySelectorAll('.unit-btn').forEach(b => b.classList.toggle('active', b.dataset.unit === unit));
  document.querySelectorAll('.unit-label').forEach(el => el.textContent = unit);
  updateDashboard();
  renderCycleBar();
  // Update timer preset active state
  $('timer-presets').querySelectorAll('.timer-preset').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.secs) === timerDuration);
  });
  window.addEventListener('resize', () => { if (currentTab === 'charts') renderChart(); });
  renderProgramSection();
  try { initPWA(); } catch {}
  try { checkAutoRecap(); } catch {}

  // ===== FIREBASE AUTH & SYNC =====
  function updateSyncButton() {
    const btn = $('sync-btn');
    if (!btn) return;
    btn.className = 'sync-btn' + (currentUser ? (syncStatus === 'synced' ? ' synced' : syncStatus === 'syncing' ? ' syncing' : syncStatus === 'error' ? ' error' : '') : '');
    btn.title = currentUser ? `Synced as ${currentUser.displayName || currentUser.email}` : 'Cloud sync (sign in)';
  }

  function renderSyncMenu() {
    const menu = $('sync-menu');
    if (!menu) return;
    if (currentUser) {
      menu.innerHTML = `
        <div class="sync-menu-status">Signed in as<br><strong>${currentUser.displayName || currentUser.email}</strong></div>
        <button class="sync-menu-item" id="sync-now-btn">Sync now</button>
        <button class="sync-menu-item" id="sync-signout-btn">Sign out</button>
        <button class="sync-menu-item" id="sync-disconnect-btn" style="color:var(--danger)">Disconnect Firebase</button>`;
    } else {
      menu.innerHTML = `
        <div class="sync-menu-status">Sign in to sync across devices</div>
        <button class="sync-menu-item" id="sync-signin-btn">Sign in with Google</button>`;
    }
  }

  function showSetupWizard() {
    const body = $('edit-body');
    body.innerHTML = `
      <div style="font-size:0.85rem;color:var(--text-dim);line-height:1.6">
        <p style="margin-bottom:12px"><strong style="color:var(--text)">One-time setup</strong> — takes about 3 minutes:</p>
        <ol style="padding-left:20px;margin-bottom:16px">
          <li style="margin-bottom:8px">Go to <a href="https://console.firebase.google.com" target="_blank" rel="noopener" style="color:var(--bench)">console.firebase.google.com</a> → <strong>Create project</strong></li>
          <li style="margin-bottom:8px"><strong>Authentication</strong> → Sign-in method → Enable <strong>Google</strong></li>
          <li style="margin-bottom:8px">Auth → Settings → Authorized domains → Add <strong>ohair900.github.io</strong></li>
          <li style="margin-bottom:8px"><strong>Firestore Database</strong> → Create database (production mode)</li>
          <li style="margin-bottom:8px">Firestore → Rules → paste this and <strong>Publish</strong>:</li>
        </ol>
        <div style="background:var(--surface2);border-radius:8px;padding:10px 12px;font-family:monospace;font-size:0.7rem;margin-bottom:16px;white-space:pre;overflow-x:auto;color:var(--text)">rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /users/{userId} {
      allow read, write: if request.auth != null
        && request.auth.uid == userId;
    }
  }
}</div>
        <ol start="6" style="padding-left:20px;margin-bottom:16px">
          <li style="margin-bottom:8px">Project Settings (gear icon) → Your apps → <strong>Add web app</strong> → Copy the <code style="background:var(--surface2);padding:1px 4px;border-radius:3px">firebaseConfig</code> object</li>
          <li>Paste it below:</li>
        </ol>
      </div>
      <textarea id="firebase-config-input" style="width:100%;height:140px;padding:10px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-family:monospace;font-size:0.75rem;resize:vertical;outline:none" placeholder='Paste the firebaseConfig here, e.g.:

{
  apiKey: "AIza...",
  authDomain: "my-app.firebaseapp.com",
  projectId: "my-app",
  ...
}'></textarea>
      <div id="config-error" style="color:var(--danger);font-size:0.75rem;margin-top:4px;display:none"></div>
      <button class="modal-save-btn" id="save-firebase-config">Connect</button>`;
    $('edit-modal').querySelector('h3').textContent = 'Cloud Sync Setup';
    $('edit-modal').style.display = '';
    document.body.style.overflow = 'hidden';

    $('save-firebase-config').addEventListener('click', () => {
      const raw = $('firebase-config-input').value.trim();
      const errEl = $('config-error');
      errEl.style.display = 'none';
      try {
        // Parse: handle both JSON and JS object literal formats
        let config;
        try {
          config = JSON.parse(raw);
        } catch {
          // Try wrapping bare JS object or extracting from assignment
          let cleaned = raw;
          // Strip "const firebaseConfig = " or "var firebaseConfig = " prefix
          cleaned = cleaned.replace(/^(const|let|var)\s+\w+\s*=\s*/, '');
          // Strip trailing semicolon
          cleaned = cleaned.replace(/;\s*$/, '');
          // Convert JS object to JSON (quote unquoted keys)
          cleaned = cleaned.replace(/(\w+)\s*:/g, '"$1":');
          // Fix double-quoted keys that were already quoted
          cleaned = cleaned.replace(/""/g, '"');
          config = JSON.parse(cleaned);
        }
        if (!config.apiKey || !config.projectId) {
          throw new Error('Missing apiKey or projectId');
        }
        // Validate required fields
        const required = ['apiKey', 'authDomain', 'projectId'];
        for (const key of required) {
          if (!config[key]) throw new Error('Missing field: ' + key);
        }
        // Save and initialize
        saveFirebaseConfig(config);
        if (initFirebase(config)) {
          closeModal('edit-modal');
          showToast('Firebase connected!');
          updateSyncButton();
          // Start auth listener
          getRedirectResult(auth).catch(() => {});
          onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
              syncStatus = 'syncing';
              updateSyncButton();
              await handleFirstSignIn();
              startRealtimeSync();
            } else {
              if (unsubSnapshot) { unsubSnapshot(); unsubSnapshot = null; }
              syncStatus = 'disconnected';
              updateSyncButton();
            }
          });
          // Auto-open sign-in
          setTimeout(() => {
            renderSyncMenu();
            $('sync-menu').classList.add('open');
          }, 500);
        } else {
          throw new Error('Firebase initialization failed. Check your config.');
        }
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = '';
      }
    });
  }

  // Sync button click — toggle menu
  $('sync-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    const menu = $('sync-menu');
    renderSyncMenu();
    menu.classList.toggle('open');
  });

  // Close sync menu on outside click
  document.addEventListener('click', (e) => {
    const menu = $('sync-menu');
    if (menu && !e.target.closest('#sync-menu') && !e.target.closest('#sync-btn')) {
      menu.classList.remove('open');
    }
  });

  // Delegate sync menu actions
  document.addEventListener('click', (e) => {
    if (e.target.closest('#sync-setup-btn')) { $('sync-menu').classList.remove('open'); showSetupWizard(); return; }
    if (e.target.closest('#sync-signin-btn')) { signInWithGoogle(); $('sync-menu').classList.remove('open'); return; }
    if (e.target.closest('#sync-signout-btn')) { signOutUser(); $('sync-menu').classList.remove('open'); return; }
    if (e.target.closest('#sync-now-btn')) { pushToCloud(); $('sync-menu').classList.remove('open'); return; }
    if (e.target.closest('#sync-disconnect-btn')) {
      if (unsubSnapshot) { unsubSnapshot(); unsubSnapshot = null; }
      if (auth && currentUser) firebaseSignOut(auth).catch(() => {});
      currentUser = null; firebaseApp = null; db = null; auth = null; authProvider = null; firebaseReady = false;
      clearFirebaseConfig();
      syncStatus = 'disconnected';
      updateSyncButton();
      $('sync-menu').classList.remove('open');
      showToast('Firebase disconnected');
      return;
    }
  });

  async function signInWithGoogle() {
    if (!firebaseReady || !auth) return;
    try {
      await signInWithPopup(auth, authProvider);
    } catch (err) {
      if (err.code === 'auth/popup-blocked' || err.code === 'auth/popup-closed-by-user') {
        try { await signInWithRedirect(auth, authProvider); } catch (e2) {
          console.error('Redirect sign-in failed:', e2);
          showToast('Sign-in failed');
        }
      } else {
        console.error('Sign-in failed:', err);
        showToast('Sign-in failed');
      }
    }
  }

  async function signOutUser() {
    if (!auth) return;
    try {
      if (unsubSnapshot) { unsubSnapshot(); unsubSnapshot = null; }
      await firebaseSignOut(auth);
      currentUser = null;
      syncStatus = 'disconnected';
      updateSyncButton();
      showToast('Signed out');
    } catch (err) {
      console.error('Sign-out failed:', err);
    }
  }

  // ===== CLOUD SYNC LOGIC =====
  function getLocalData() {
    return {
      entries,
      profile,
      goals,
      prs,
      cycles,
      programs: programConfig,
      unit: localStorage.getItem(UNIT_KEY) || 'lbs',
      timer: timerDuration,
      theme,
      schemaVersion: SCHEMA_VERSION
    };
  }

  async function pushToCloud() {
    if (!currentUser || !db || isMergingFromCloud) return;
    try {
      syncStatus = 'syncing';
      updateSyncButton();
      const data = getLocalData();
      data.lastModified = serverTimestamp();
      await setDoc(doc(db, 'users', currentUser.uid), data);
      syncStatus = 'synced';
      updateSyncButton();
    } catch (err) {
      console.error('Push to cloud failed:', err);
      syncStatus = 'error';
      updateSyncButton();
    }
  }

  function scheduleCloudSync() {
    if (!currentUser || !db || isMergingFromCloud) return;
    clearTimeout(syncDebounceTimer);
    syncDebounceTimer = setTimeout(() => pushToCloud(), SYNC_DEBOUNCE_MS);
  }

  function mergeCloudData(cloudData) {
    if (!cloudData) return;
    isMergingFromCloud = true;
    try {
      // Merge entries: union by ID, newer timestamp wins for edits
      if (cloudData.entries && Array.isArray(cloudData.entries)) {
        const localMap = new Map(entries.map(e => [e.id, e]));
        cloudData.entries.forEach(ce => {
          const local = localMap.get(ce.id);
          if (!local) {
            entries.push(ce);
          } else if (ce.timestamp > local.timestamp) {
            Object.assign(local, ce);
          }
        });
      }

      // Merge profile: cloud wins, bodyweight history merged by timestamp
      if (cloudData.profile) {
        if (cloudData.profile.gender) profile.gender = cloudData.profile.gender;
        if (cloudData.profile.bodyweight) profile.bodyweight = cloudData.profile.bodyweight;
        if (cloudData.profile.bodyweightHistory && Array.isArray(cloudData.profile.bodyweightHistory)) {
          const localBWMap = new Map((profile.bodyweightHistory || []).map(b => [b.timestamp, b]));
          cloudData.profile.bodyweightHistory.forEach(cb => {
            if (!localBWMap.has(cb.timestamp)) {
              profile.bodyweightHistory.push(cb);
            }
          });
          profile.bodyweightHistory.sort((a, b) => a.timestamp - b.timestamp);
        }
      }

      // Goals: cloud wins (last-write-wins)
      if (cloudData.goals) goals = { ...goals, ...cloudData.goals };

      // Cycles: merge by ID
      if (cloudData.cycles && Array.isArray(cloudData.cycles)) {
        const localCycleMap = new Map(cycles.map(c => [c.id, c]));
        cloudData.cycles.forEach(cc => {
          if (!localCycleMap.has(cc.id)) {
            cycles.push(cc);
          } else {
            Object.assign(localCycleMap.get(cc.id), cc);
          }
        });
        activeCycleId = (cycles.find(c => c.active) || {}).id || null;
      }

      // Programs: cloud wins (last-write-wins)
      if (cloudData.programs) {
        programConfig = { ...programConfig, ...cloudData.programs };
        saveProgramConfig();
      }

      // Unit, timer, theme: cloud wins
      if (cloudData.unit) {
        unit = cloudData.unit;
        localStorage.setItem(UNIT_KEY, unit);
        document.querySelectorAll('.unit-btn').forEach(b => b.classList.toggle('active', b.dataset.unit === unit));
        document.querySelectorAll('.unit-label').forEach(el => el.textContent = unit);
      }
      if (cloudData.timer) {
        timerDuration = cloudData.timer;
        localStorage.setItem(TIMER_KEY, timerDuration.toString());
      }
      if (cloudData.theme) {
        theme = cloudData.theme;
        applyTheme();
      }

      // Rebuild PRs from merged entries
      rebuildPRs();
      saveAll();

      // Refresh UI
      updateDashboard();
      renderCycleBar();
      if (currentTab === 'log') renderProgramSection();
      if (currentTab === 'history') renderHistory();
      if (currentTab === 'charts') renderChart();
      if (currentTab === 'stats') renderStats();
    } finally {
      isMergingFromCloud = false;
    }
  }

  function startRealtimeSync() {
    if (!currentUser || !db) return;
    if (unsubSnapshot) { unsubSnapshot(); unsubSnapshot = null; }
    const userDocRef = doc(db, 'users', currentUser.uid);
    unsubSnapshot = onSnapshot(userDocRef, (snapshot) => {
      if (!snapshot.exists()) return;
      const cloudData = snapshot.data();
      // Skip if this was triggered by our own write
      if (isMergingFromCloud) return;
      mergeCloudData(cloudData);
      syncStatus = 'synced';
      updateSyncButton();
    }, (err) => {
      console.error('Snapshot listener error:', err);
      syncStatus = 'error';
      updateSyncButton();
    });
  }

  async function handleFirstSignIn() {
    if (!currentUser || !db) return;
    const userDocRef = doc(db, 'users', currentUser.uid);
    try {
      const snapshot = await getDoc(userDocRef);
      if (!snapshot.exists()) {
        // No cloud doc — push all local data up
        await pushToCloud();
      } else {
        // Cloud doc exists — merge cloud into local, then push merged result back
        mergeCloudData(snapshot.data());
        await pushToCloud();
      }
    } catch (err) {
      console.error('First sign-in sync failed:', err);
      syncStatus = 'error';
      updateSyncButton();
    }
  }

  // Auth state listener
  if (firebaseReady && auth) {
    // Check for redirect result first
    getRedirectResult(auth).catch(() => {});

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        syncStatus = 'syncing';
        updateSyncButton();
        await handleFirstSignIn();
        startRealtimeSync();
      } else {
        if (unsubSnapshot) { unsubSnapshot(); unsubSnapshot = null; }
        syncStatus = 'disconnected';
        updateSyncButton();
      }
    });
  }

  // ===== WRAP SAVE FUNCTIONS WITH CLOUD SYNC =====
  const _origSaveEntries = saveEntries;
  saveEntries = function() { _origSaveEntries(); scheduleCloudSync(); };
  const _origSaveProfile = saveProfile;
  saveProfile = function() { _origSaveProfile(); scheduleCloudSync(); };
  const _origSaveGoals = saveGoals;
  saveGoals = function() { _origSaveGoals(); scheduleCloudSync(); };
  const _origSavePRs = savePRs;
  savePRs = function() { _origSavePRs(); scheduleCloudSync(); };
  const _origSaveCycles = saveCycles;
  saveCycles = function() { _origSaveCycles(); scheduleCloudSync(); };
  const _origSaveProgramConfig = saveProgramConfig;
  saveProgramConfig = function() { _origSaveProgramConfig(); scheduleCloudSync(); };
  const _origSaveAll = saveAll;
  saveAll = function() { _origSaveAll(); scheduleCloudSync(); };

  updateSyncButton();
</script>
</body>
</html>
